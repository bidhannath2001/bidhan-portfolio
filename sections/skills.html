<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skills Section</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex items-center justify-center">

<section id="skills" class="py-20 px-4 sm:px-6 lg:px-8">
    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-14">
            <p class="text-sm font-medium text-green-600 uppercase tracking-wider mb-2">
                My Expertise
            </p>
            <h2 class="text-3xl sm:text-4xl font-bold text-slate-900 dark:text-white">
                Skills & Technologies
            </h2>
        </div>
        <div class="grid md:grid-cols-3 gap-6">
            <div class="p-6 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">
                <h3 class="text-lg font-semibold text-slate-900 dark:text-white mb-4">Mobile Development</h3>
                <div class="flex flex-wrap gap-2">
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">Flutter</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">Dart</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">Firebase</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">REST API</span>
                </div>
            </div>
            <div class="p-6 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">
                <h3 class="text-lg font-semibold text-slate-900 dark:text-white mb-4">Programming & Backend</h3>
                <div class="flex flex-wrap gap-2">
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">C++</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">Python</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">PHP</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">Laravel</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">MySQL</span>
                </div>
            </div>
            <div class="p-6 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">
                <h3 class="text-lg font-semibold text-slate-900 dark:text-white mb-4">Tools & Others</h3>
                <div class="flex flex-wrap gap-2">
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">Git</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">GitHub</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">VS Code</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">Android Studio</span>
                    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-700">Postman</span>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
